<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Alto Custo — Rastreamento</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22Alto%20Custo%22,%22display%22:%22standalone%22}">
<style>
  :root{--navy:#1f3864;--blue:#2e5496;--teal:#0d9488;--bg:#f4f6fb;--card:#fff;--ink:#16223a;--mut:#64748b;--line:#e3e8f0;--red:#dc2626;--redbg:#fee2e2;--amber:#b45309;--amberbg:#fef3c7;--green:#15803d;--greenbg:#dcfce7;--greybg:#eef2f7;--orange:#9a3412;--orangebg:#ffedd5}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45}
  .hidden{display:none!important}
  header{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;padding:max(12px,env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:10px}
  header h1{font-size:16px;margin:0;font-weight:700;flex:1}
  header small{display:block;font-weight:400;opacity:.75;font-size:11px}
  .iconbtn{background:rgba(255,255,255,.14);border:0;color:#fff;border-radius:9px;padding:8px 10px;font-size:13px;font-weight:600}
  .tabs{display:flex;gap:6px;padding:10px 14px 0}
  .tabs button{flex:1;border:1px solid var(--line);background:#fff;color:var(--mut);border-radius:10px;padding:9px;font-weight:700;font-size:13px}
  .tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .counts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 14px 4px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
  .stat b{display:block;font-size:20px;line-height:1.1}
  .stat span{font-size:9.5px;color:var(--mut);font-weight:600;text-transform:uppercase}
  .stat.alert b{color:var(--red)} .stat.alert{background:var(--redbg);border-color:#fca5a5}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:10px 14px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;border:1px solid var(--line);background:#fff;color:var(--mut);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600}
  .chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .search{padding:0 14px 4px}
  .search input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:15px}
  main{padding:6px 14px 110px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(20,34,58,.04)}
  .card .row1{display:flex;align-items:flex-start;gap:8px}
  .card .pac{font-weight:700;font-size:15.5px;flex:1}
  .cardright{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .datebadge{font-size:11px;font-weight:700;color:#475569;background:var(--greybg);padding:4px 9px;border-radius:999px;white-space:nowrap}
  .cibtn{background:var(--teal);color:#fff;border:0;border-radius:9px;padding:7px 11px;font-size:12px;font-weight:700;white-space:nowrap}
  .cibtn.out{background:var(--blue)} .cibtn.falt{background:var(--orange)} .cibtn.clin{background:var(--green)}
  .badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;white-space:nowrap}
  .b-Pendente{background:var(--redbg);color:var(--red)}
  .b-Entregue{background:var(--greenbg);color:var(--green)}
  .b-aguardando{background:var(--amberbg);color:var(--amber)}
  .b-conf{background:#e0ecff;color:var(--blue)}
  .b-falt{background:var(--orangebg);color:var(--orange)}
  .card .meta{color:var(--mut);font-size:12px;margin-top:5px}
  .mi{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .mi:first-of-type{border-top:0}
  .mi-n{font-size:13px;color:#334155}
  .mi-s{font-size:11.5px;font-weight:700;margin-top:2px}
  .mi-s.ok{color:var(--green)} .mi-s.pend{color:var(--red)} .mi-s.wait{color:var(--mut)} .mi-s.ag{color:var(--amber)} .mi-s.bl{color:var(--blue)} .mi-s.fa{color:var(--orange)}
  .fab{position:fixed;right:16px;bottom:max(18px,env(safe-area-inset-bottom));z-index:30;background:var(--teal);color:#fff;border:0;border-radius:16px;padding:15px 18px;font-size:15px;font-weight:700;box-shadow:0 6px 18px rgba(13,148,136,.4)}
  .scrim{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:40;display:flex;align-items:flex-end}
  .sheet{background:#fff;width:100%;max-height:94vh;border-radius:20px 20px 0 0;overflow-y:auto;padding:6px 16px calc(24px + env(safe-area-inset-bottom))}
  .grab{width:42px;height:5px;background:#cbd5e1;border-radius:3px;margin:10px auto 8px}
  .sheet h2{font-size:17px;margin:4px 0 2px}
  .sheet .sub{color:var(--mut);font-size:13px;margin:0 0 6px}
  .seclabel{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--navy);margin:16px 0 8px;padding-bottom:5px;border-bottom:2px solid var(--line)}
  label.fld{display:block;margin-bottom:11px}
  label.fld span{display:block;font-size:12.5px;color:var(--mut);font-weight:600;margin-bottom:4px}
  input,select,textarea{font-family:inherit;font-size:15px;width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:#fff;color:var(--ink)}
  textarea{min-height:62px;resize:vertical}
  .btn{width:100%;border:0;border-radius:13px;padding:14px;font-size:15.5px;font-weight:700;margin-top:8px}
  .btn.primary{background:var(--navy);color:#fff} .btn.teal{background:var(--teal);color:#fff} .btn.blue{background:var(--blue);color:#fff} .btn.orange{background:var(--orange);color:#fff} .btn.green{background:var(--green);color:#fff} .btn.ghost{background:var(--greybg);color:var(--navy)} .btn.danger{background:#fff;color:var(--red);border:1px solid #fca5a5}
  .imp{border:1.5px dashed var(--teal);background:#f0fdfa;border-radius:13px;padding:14px;text-align:center;margin:8px 0 2px}
  .imp p{margin:0 0 4px;font-size:13px;color:#0f766e;font-weight:600}
  .imp small{color:var(--mut);font-weight:400;font-size:11.5px}
  .impstatus{font-size:12.5px;font-weight:700;margin-top:9px}
  .impstatus.ok{color:var(--green)} .impstatus.err{color:var(--red)}
  .revise{background:var(--amberbg);color:var(--amber);font-size:12px;font-weight:700;border-radius:9px;padding:8px 11px;margin:8px 0}
  .filled input,.filled textarea{background:#f0fdfa;border-color:#5eead4}
  .sumbox{background:var(--greybg);border-radius:11px;padding:10px 12px;margin:4px 0 12px}
  .sumbox .sr{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}
  .sumbox .sr b{font-weight:800}
  .sumbox .sr.part b{color:var(--red)}
  .citem{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
  .citem .nm{font-weight:600;font-size:14px;margin-bottom:4px}
  .citem .prev{font-size:12px;color:var(--mut);margin-bottom:9px}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px;font-weight:700;font-size:13px;margin:0}
  .seg button.onok{background:var(--greenbg);border-color:#86efac;color:var(--green)}
  .seg button.onno{background:var(--redbg);border-color:#fca5a5;color:var(--red)}
  .sub2{margin-top:9px}
  .sub2 span{display:block;font-size:11.5px;color:var(--mut);font-weight:600;margin-bottom:4px}
  .chk{display:flex;align-items:center;gap:9px;margin-top:9px;font-weight:700;font-size:13.5px}
  .chk input{width:20px;height:20px;flex:0 0 auto}
  .clog{font-size:11.5px;color:var(--mut);margin-top:8px;background:var(--greybg);border-radius:8px;padding:7px 9px}
  .clog div{margin-bottom:2px}
  .tl{font-size:12px;margin-top:3px} .tl b{color:var(--ink)}
  .noent{font-size:12px;color:var(--red);font-weight:600;margin:6px 0}
  .hpat{font-weight:700;margin:16px 0 2px;font-size:14px;color:var(--navy)}
  .hrow{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;border-top:1px solid var(--line);padding:7px 0}
  .hrow .hn{flex:1;color:#334155}
  .hrow .hq{font-weight:800;white-space:nowrap}
  .hrow .hs{font-size:11px;color:var(--mut)}
  .login{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;background:linear-gradient(160deg,#1f3864,#2e5496)}
  .login .box{background:#fff;border-radius:18px;padding:24px 20px;max-width:420px;width:100%;margin:0 auto}
  .login h1{margin:0 0 2px;font-size:20px;color:var(--navy)}
  .login p{margin:0 0 18px;color:var(--mut);font-size:13px}
  .err{background:var(--redbg);color:var(--red);border-radius:10px;padding:10px 12px;font-size:13px;font-weight:600;margin-top:10px}
  .empty{text-align:center;color:var(--mut);padding:50px 20px;font-size:14px}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#0f172a;color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;font-weight:600;z-index:60;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .banner{background:var(--amberbg);color:var(--amber);font-size:12.5px;font-weight:600;padding:9px 14px;text-align:center}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
if(window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
let sb=null, rows=[], filter="Todos", search="", view="proc";

function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}
function fmt(d){if(!d)return"—";const p=String(d).slice(0,10).split("-");return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d;}
function today(){return new Date().toISOString().slice(0,10);}
function NUM(v){const n=parseInt(String(v==null?"":v).replace(/[^0-9]/g,""),10);return isNaN(n)?0:n;}
function esp(it){return NUM(it.qtd_esperada!=null?it.qtd_esperada:it.qtd_prev);}
function rec(it){return NUM(it.qtd_recebida);}
function falta(it){return Math.max(esp(it)-rec(it),0);}

function itensDe(r){
  let arr=(Array.isArray(r.itens)&&r.itens.length)?r.itens
    :(r.medicamentos||"").split("\n").map(s=>s.trim()).filter(Boolean).map(n=>({nome:n}));
  return arr.map(it=>{
    const nome=it.nome||"";const qm=nome.match(/(\d+)\s*\/\s*m[eê]s/i);
    const espv=it.qtd_esperada!=null?it.qtd_esperada:(it.qtd_prev!=null?it.qtd_prev:(qm?qm[1]:null));
    return {
      nome, qtd_esperada: espv,
      qtd_recebida: it.qtd_recebida!=null?it.qtd_recebida:(it.recebido===true?(it.qtd_receb!=null?it.qtd_receb:espv):0),
      co_done: it.co_done===true?true:(it.recebido===true),
      just_falta: it.just_falta||"",
      receb_data: it.receb_data||it.data_retirada||null,
      entrada:(it.entrada===true||it.entrada===false)?it.entrada:(it.entregue===true?true:(it.entregue===false?false:null)),
      entrada_motivo: it.entrada_motivo||"", entrada_data: it.entrada_data||null,
      clinica:(it.clinica===true||it.clinica===false)?it.clinica:null,
      clinica_obs: it.clinica_obs||"", clinica_data: it.clinica_data||null,
      comentarios: Array.isArray(it.comentarios)?it.comentarios:(it.problema?[{txt:it.problema,em:null}]:[])
    };
  });
}
function statusDe(its){
  if(!its.length)return "Protocolado";
  if(its.some(i=>i.entrada===false))return "Pendente";
  if(its.some(i=>i.entrada==null))return "Protocolado";
  const e=its.filter(i=>i.entrada===true);
  if(e.some(i=>!i.co_done))return "Aguardando retirada";
  if(e.some(i=>falta(i)>0&&i.just_falta))return "Faltantes";
  if(e.some(i=>falta(i)>0))return "Aguardando retirada";
  if(e.some(i=>i.clinica===false))return "Pendente";
  if(e.some(i=>i.clinica!==true))return "Aguardando conferência";
  return "Entregue";
}
function stOf(r){return statusDe(itensDe(r));}
function needCheckin(its){return its.some(i=>i.entrada!==true);}
function needCheckout(its){return its.some(i=>i.entrada===true&&!i.co_done);}
function needFaltantes(its){return its.some(i=>i.entrada===true&&i.co_done&&falta(i)>0&&i.just_falta);}
function needEntrega(its){return its.some(i=>i.entrada===true&&i.co_done&&falta(i)===0&&rec(i)>0&&i.clinica!==true);}

// ---------- LOGIN ----------
function configured(){return SUPABASE_URL && !SUPABASE_URL.includes("COLE_") && SUPABASE_ANON && !SUPABASE_ANON.includes("COLE_");}
if(configured()){ sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON); sb.auth.getSession().then(({data})=>{if(data.session)showApp(data.session);}); }
else{ document.getElementById("cfgWarn") && document.getElementById("cfgWarn").classList.remove("hidden"); }
document.getElementById("loginBtn").onclick=async()=>{
  const err=document.getElementById("loginErr");err.classList.add("hidden");
  if(!configured()){err.textContent="App ainda não configurado.";err.classList.remove("hidden");return;}
  const {data,error}=await sb.auth.signInWithPassword({email:document.getElementById("email").value.trim(),password:document.getElementById("pass").value});
  if(error){err.textContent="Não foi possível entrar: "+error.message;err.classList.remove("hidden");return;}
  showApp(data.session);
};
document.getElementById("logoutBtn").onclick=async()=>{await sb.auth.signOut();location.reload();};
document.getElementById("reloadBtn").onclick=load;
document.getElementById("newBtn").onclick=()=>openForm();
document.getElementById("q").addEventListener("input",e=>{search=e.target.value.toLowerCase();render();});
document.getElementById("tabProc").onclick=()=>{view="proc";setTabs();render();};
document.getElementById("tabHist").onclick=()=>{view="hist";setTabs();render();};
function setTabs(){document.getElementById("tabProc").classList.toggle("on",view==="proc");document.getElementById("tabHist").classList.toggle("on",view==="hist");document.getElementById("procWrap").classList.toggle("hidden",view!=="proc");document.getElementById("newBtn").classList.toggle("hidden",view!=="proc");}
function showApp(s){document.getElementById("login").classList.add("hidden");document.getElementById("app").classList.remove("hidden");document.getElementById("who").textContent="· "+(s.user.email||"");buildChips();setTabs();load();}
async function load(){const {data,error}=await sb.from("processos").select("*").order("created_at",{ascending:false});if(error){toast("Erro ao carregar: "+error.message);return;}rows=data||[];render();}

// ---------- COUNTS + CHIPS ----------
function renderCounts(){
  const ret=rows.filter(r=>needCheckout(itensDe(r))).length;
  const fal=rows.filter(r=>needFaltantes(itensDe(r))).length;
  const conf=rows.filter(r=>needEntrega(itensDe(r))).length;
  const cards=[["Total",rows.length,false],["Retirada",ret,false],["Faltantes",fal,fal>0],["Conferência",conf,false]];
  document.getElementById("counts").innerHTML=cards.map(([l,n,a])=>`<div class="stat${a?' alert':''}"><b>${n}</b><span>${l}</span></div>`).join("");
}
function buildChips(){
  const opts=["Todos","A dar entrada","Aguardando retirada","Faltantes","Conferência clínica","Entregues"];
  document.getElementById("chips").innerHTML=opts.map(o=>`<button class="chip${o===filter?' on':''}" data-f="${o}">${o}</button>`).join("");
  document.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{filter=b.dataset.f;buildChips();render();});
}
function matchesFilter(r){
  const its=itensDe(r);
  switch(filter){
    case "A dar entrada": return stOf(r)!=="Entregue"&&needCheckin(its);
    case "Aguardando retirada": return needCheckout(its);
    case "Faltantes": return needFaltantes(its);
    case "Conferência clínica": return needEntrega(its);
    case "Entregues": return stOf(r)==="Entregue";
    default: return true;
  }
}
function medLine(it){
  const E=esp(it),R=rec(it);
  if(it.clinica===true)return `<div class="mi-s ok">✔ entregue na clínica ${fmt(it.clinica_data)} (${R}/${E})</div>`;
  if(it.clinica===false)return `<div class="mi-s pend">⚠ divergência na clínica${it.clinica_obs?': '+esc(it.clinica_obs):''}</div>`;
  if(it.co_done&&falta(it)>0&&it.just_falta)return `<div class="mi-s fa">parcial ${R}/${E} — ${esc(it.just_falta)} (faltam ${falta(it)})</div>`;
  if(it.co_done&&falta(it)===0)return `<div class="mi-s bl">retirado ${R}/${E} — conferir na clínica</div>`;
  if(it.entrada===false)return `<div class="mi-s pend">⚠ não teve entrada${it.entrada_motivo?': '+esc(it.entrada_motivo):''}${it.entrada_data?' ('+fmt(it.entrada_data)+')':''}</div>`;
  if(it.entrada===true)return `<div class="mi-s ag">entrada ok — aguardando retirada (esp. ${E})</div>`;
  return `<div class="mi-s wait">aguardando entrada de documentos</div>`;
}

// ---------- RENDER ----------
function render(){
  if(view==="hist"){renderHist();return;}
  renderCounts();
  let list=rows.filter(matchesFilter);
  if(search)list=list.filter(r=>(r.paciente||"").toLowerCase().includes(search));
  const el=document.getElementById("list");
  if(!list.length){el.innerHTML=`<div class="empty">Nenhum processo aqui.<br>Toque em <b>＋ Novo</b> para começar.</div>`;return;}
  el.innerHTML=list.map(r=>{
    const its=itensDe(r),st=stOf(r);
    let badge;
    if(st==="Entregue")badge=`<span class="badge b-Entregue">Entregue</span>`;
    else if(st==="Pendente")badge=`<span class="badge b-Pendente">Pendente</span>`;
    else if(st==="Faltantes")badge=`<span class="badge b-falt">Faltantes</span>`;
    else if(st==="Aguardando retirada")badge=`<span class="badge b-aguardando">Aguard. retirada</span>`;
    else if(st==="Aguardando conferência")badge=`<span class="badge b-conf">Conferir clínica</span>`;
    else badge=`<span class="datebadge">${fmt(r.data_protocolo)}</span>`;
    let btns="";
    if(st!=="Entregue"&&needCheckin(its))btns+=`<button class="cibtn" data-ci="${r.id}">Check-in (docs)</button>`;
    if(needCheckout(its))btns+=`<button class="cibtn out" data-co="${r.id}">Check-out (retirada)</button>`;
    if(needFaltantes(its))btns+=`<button class="cibtn falt" data-fa="${r.id}">Faltantes (check-out)</button>`;
    if(needEntrega(its))btns+=`<button class="cibtn clin" data-en="${r.id}">Entrega na clínica</button>`;
    const mi=its.map(it=>`<div class="mi"><div class="mi-n">${esc(it.nome)}</div>${medLine(it)}</div>`).join("");
    return `<div class="card" data-id="${r.id}">
      <div class="row1"><div class="pac">${esc(r.paciente||"—")}</div><div class="cardright">${badge}${btns}</div></div>
      <div class="meta">protocolo ${fmt(r.data_protocolo)} · retorno p/ retirada ${fmt(r.previsao_retirada)}</div>
      ${mi}
    </div>`;
  }).join("");
  document.querySelectorAll(".card").forEach(c=>c.onclick=e=>{ if(e.target.closest("[data-ci],[data-co],[data-fa],[data-en]"))return; openDetail(c.dataset.id); });
  document.querySelectorAll("[data-ci]").forEach(b=>b.onclick=e=>{e.stopPropagation();openCheckin(b.dataset.ci);});
  document.querySelectorAll("[data-co]").forEach(b=>b.onclick=e=>{e.stopPropagation();openCheckout(b.dataset.co,false);});
  document.querySelectorAll("[data-fa]").forEach(b=>b.onclick=e=>{e.stopPropagation();openCheckout(b.dataset.fa,true);});
  document.querySelectorAll("[data-en]").forEach(b=>b.onclick=e=>{e.stopPropagation();openEntrega(b.dataset.en);});
}

// ---------- HISTÓRICO ----------
function renderHist(){
  let data=rows.slice();
  if(search)data=data.filter(r=>(r.paciente||"").toLowerCase().includes(search));
  data.sort((a,b)=>(a.paciente||"").localeCompare(b.paciente||""));
  const el=document.getElementById("list");
  if(!data.length){el.innerHTML=`<div class="empty">Sem registros.</div>`;return;}
  el.innerHTML=`<input id="hq" placeholder="Buscar paciente…" style="margin-bottom:8px" value="${esc(search)}">`+data.map(r=>{
    const its=itensDe(r);
    const linhas=its.map(it=>{
      const E=esp(it),R=rec(it);
      let sit;
      if(it.clinica===true)sit="entregue clínica "+fmt(it.clinica_data);
      else if(it.clinica===false)sit="divergência clínica";
      else if(it.co_done&&falta(it)>0)sit="parcial (faltam "+falta(it)+")";
      else if(it.co_done)sit="retirado "+fmt(it.receb_data);
      else if(it.entrada===false)sit="não teve entrada";
      else if(it.entrada===true)sit="aguardando retirada";
      else sit="aguardando entrada";
      return `<div class="hrow"><div class="hn">${esc(it.nome)}<div class="hs">${sit}</div></div><div class="hq">${R}/${E}</div></div>`;
    }).join("");
    return `<div class="hpat">${esc(r.paciente||"—")} <span style="font-weight:400;color:var(--mut);font-size:12px">· protocolo ${fmt(r.data_protocolo)}</span></div>${linhas}`;
  }).join("");
  const hq=document.getElementById("hq"); if(hq)hq.addEventListener("input",e=>{search=e.target.value.toLowerCase();renderHist();});
}

async function save(scrim){
  const pac=document.getElementById("f_pac").value.trim(); if(!pac){toast("Informe o paciente");return;}
  const med=document.getElementById("f_med").value;
  const itens=med.split("\n").map(s=>s.trim()).filter(Boolean).map(n=>{const qm=n.match(/(\d+)\s*\/\s*m[eê]s/i);
    return {nome:n,qtd_esperada:qm?qm[1]:null,qtd_recebida:0,co_done:false,just_falta:"",receb_data:null,entrada:null,entrada_motivo:"",entrada_data:null,clinica:null,clinica_obs:"",clinica_data:null,comentarios:[]};});
  const rec={paciente:pac,medicamentos:med||null,data_protocolo:document.getElementById("f_prot").value||null,itens,status:statusDe(itens)};
  const res=await sb.from("processos").insert(rec);
  if(res.error){toast("Erro ao salvar: "+res.error.message);return;}
  scrim.remove();toast("Processo criado ✔");load();
}

    const L=[];
    L.push(`Esperado: ${esp(it)} · Recebido: ${rec(it)}`);

    L.push(`Retirada: ${it.co_done?(rec(it)+'/'+esp(it)+(falta(it)>0?' parcial: '+esc(it.just_falta||'-'):''))+(it.receb_data?' · '+fmt(it.receb_data):''):'—'}`);
    L.push(`Clínica: ${it.clinica===true?'conferido':it.clinica===false?'DIVERGÊNCIA ('+esc(it.clinica_obs||'-')+')':'—'}${it.clinica_data?' · '+fmt(it.clinica_data):''}`);

// ---------- CHECK-IN ----------
function openCheckin(id){
  const r=rows.find(x=>x.id===id); if(!r)return;
  const work=itensDe(r).map(i=>({...i, entrada:i.entrada===false?false:true, novo:""}));
  const scrim=mkScrim(`<div class="sheet"><div class="grab"></div>
    <h2>Check-in — entrega de documentos</h2><p class="sub">${esc(r.paciente)}</p>
    <div id="ciList"></div>
    <button class="btn teal" id="ciConfirm">Confirmar entrada</button>
    <button class="btn ghost" id="ciClose">Cancelar</button></div>`);
  const listEl=scrim.querySelector("#ciList");
  function readInputs(){work.forEach((it,k)=>{const m=listEl.querySelector(`[data-m="${k}"]`);if(m)it.entrada_motivo=m.value;const d=listEl.querySelector(`[data-ed="${k}"]`);if(d)it.entrada_data=d.value;const c=listEl.querySelector(`[data-c="${k}"]`);if(c)it.novo=c.value;});}
  function draw(){
    listEl.innerHTML=work.map((it,k)=>{
      const ne=it.entrada?"":`<div class="sub2"><span>Motivo (não teve entrada) *</span><input data-m="${k}" value="${esc(it.entrada_motivo)}"></div><div class="sub2"><span>Data</span><input type="date" data-ed="${k}" value="${it.entrada_data||today()}"></div>`;
      return `<div class="citem"><div class="nm">${esc(it.nome)}</div>
        <div class="seg"><button type="button" data-ok="${k}" class="${it.entrada?'onok':''}">Teve entrada</button><button type="button" data-no="${k}" class="${it.entrada?'':'onno'}">Não teve entrada</button></div>
        ${ne}<div class="sub2"><span>Comentário (opcional)</span><input data-c="${k}" value="${esc(it.novo)}"></div></div>`;
    }).join("");
    listEl.querySelectorAll("[data-ok]").forEach(b=>b.onclick=()=>{readInputs();work[b.dataset.ok].entrada=true;draw();});
    listEl.querySelectorAll("[data-no]").forEach(b=>b.onclick=()=>{readInputs();work[b.dataset.no].entrada=false;draw();});
  }
  draw();
  scrim.querySelector("#ciClose").onclick=()=>scrim.remove();
  scrim.querySelector("#ciConfirm").onclick=async()=>{
    readInputs();
    for(const it of work){if(!it.entrada&&!it.entrada_motivo.trim()){toast("Motivo de: "+it.nome);return;}}
    const itens=work.map(it=>{const com=it.comentarios.slice();if(it.novo.trim())com.push({txt:it.novo.trim(),em:today()});
      return baseItem(it,{entrada:it.entrada,entrada_motivo:it.entrada?"":it.entrada_motivo.trim(),entrada_data:it.entrada_data||today(),comentarios:com});});
    await salvar(id,itens,"Entrada registrada ✔",scrim);
  };
}

// ---------- CHECK-OUT (retirada) e FALTANTES ----------
function openCheckout(id,faltantes){
  const r=rows.find(x=>x.id===id); if(!r)return;
  const all=itensDe(r);
  const work=all.map(i=>({...i}));
  const elig = faltantes ? work.filter(i=>i.entrada===true&&i.co_done&&falta(i)>0&&i.just_falta)
                         : work.filter(i=>i.entrada===true);
  const sem = work.filter(i=>!elig.includes(i));
  const titulo = faltantes?"Medicações faltantes — check-out":"Check-out — retirada de medicações";
  const scrim=mkScrim(`<div class="sheet"><div class="grab"></div>
    <h2>${titulo}</h2><p class="sub">${esc(r.paciente)} — ${faltantes?'retirada do que faltou':'confira o número unitário recebido'}</p>
    <div class="sumbox" id="coSum"></div>
    <div id="coList"></div>
    ${faltantes?"":`<label class="chk"><input type="checkbox" id="jallchk"> Justificar todas as parciais com o mesmo motivo</label>
    <div class="sub2"><span>Justificativa coletiva</span><input id="jall" placeholder="ex.: falta de medicamentos na farmácia"></div>`}
    <button class="btn ${faltantes?'orange':'blue'}" id="coConfirm">${faltantes?'Confirmar faltantes':'Confirmar retirada'}</button>
    <button class="btn ghost" id="coClose">Cancelar</button></div>`);
  const listEl=scrim.querySelector("#coList"), sumEl=scrim.querySelector("#coSum");
  function curRecebida(it,k){const q=listEl.querySelector(`[data-q="${k}"]`);
    if(!q)return rec(it);
    if(faltantes)return rec(it)+NUM(q.value); else return NUM(q.value);}
  function updateSum(){
    sumEl.innerHTML=elig.map(it=>{const k=work.indexOf(it);const R=Math.min(curRecebida(it,k),esp(it));const part=R<esp(it);
      return `<div class="sr ${part?'part':''}"><span>${esc(it.nome.split(" — ")[0])}</span><b>${R}/${esp(it)}</b></div>`;}).join("")||'<div class="sr"><span>Sem itens</span><b></b></div>';
  }
  listEl.innerHTML=elig.map(it=>{const k=work.indexOf(it);
    const def = faltantes ? falta(it) : esp(it);
    return `<div class="citem"><div class="nm">${esc(it.nome)}</div>
      <div class="prev">solicitado: ${esp(it)} un${faltantes?` · já recebido: ${rec(it)} · faltam: ${falta(it)}`:''}</div>
      <div class="sub2"><span>${faltantes?'Quantidade recebida agora':'Quantidade recebida'}</span><input type="number" inputmode="numeric" data-q="${k}" value="${def}"></div>
      <div class="sub2"><span>Data da retirada</span><input type="date" data-d="${k}" value="${today()}"></div>
      ${faltantes?"":`<div class="sub2"><span>Justificativa (se parcial)</span><input data-j="${k}" value="${esc(it.just_falta)}"></div>`}
      <div class="sub2"><span>Comentário (opcional)</span><input data-c="${k}" value=""></div></div>`;
  }).join("")+(sem.length&&!faltantes?`<div class="noent">Sem entrada (não disponível): ${sem.filter(i=>i.entrada!==true).map(i=>esc(i.nome)).join("; ")}</div>`:"");
  listEl.querySelectorAll("[data-q]").forEach(q=>q.addEventListener("input",updateSum));
  updateSum();
  scrim.querySelector("#coClose").onclick=()=>scrim.remove();
  scrim.querySelector("#coConfirm").onclick=async()=>{
    const jallchk=scrim.querySelector("#jallchk"), jall=scrim.querySelector("#jall");
    const useAll=jallchk&&jallchk.checked, allTxt=jall?jall.value.trim():"";
    for(const it of elig){const k=work.indexOf(it);
      const q=NUM(listEl.querySelector(`[data-q="${k}"]`).value);
      const d=listEl.querySelector(`[data-d="${k}"]`).value||today();
      const c=listEl.querySelector(`[data-c="${k}"]`);
      let novoR = faltantes ? Math.min(rec(it)+q,esp(it)) : Math.min(q,esp(it));
      it.qtd_recebida=novoR; it.co_done=true; it.receb_data=d;
      if(esp(it)-novoR>0){
        const jind=listEl.querySelector(`[data-j="${k}"]`);
        const j = faltantes ? (it.just_falta||"") : (useAll?allTxt:(jind?jind.value.trim():""));
        if(!j){toast("Justifique a parcial de: "+it.nome);return;}
        it.just_falta=j;
      } else { it.just_falta=""; }
      it._novo = c?c.value.trim():"";
    }
    const itens=work.map(it=>{const com=it.comentarios.slice();if(it._novo)com.push({txt:it._novo,em:today()});
      return baseItem(it,{qtd_recebida:it.qtd_recebida,co_done:it.co_done,receb_data:it.receb_data,just_falta:it.just_falta,comentarios:com});});
    await salvar(id,itens,faltantes?"Faltantes atualizadas ✔":"Retirada salva ✔",scrim);
  };
}

    <button class="btn green" id="enConfirm">Confirmar conferência</button>
    <button class="btn ghost" id="enClose">Cancelar</button></div>`);

  function readInputs(){work.forEach((it,k)=>{const o=listEl.querySelector(`[data-o="${k}"]`);if(o)it._obs=o.value;const d=listEl.querySelector(`[data-d="${k}"]`);if(d)it._d=d.value;const c=listEl.querySelector(`[data-c="${k}"]`);if(c)it.novo=c.value;});}

      return `<div class="citem"><div class="nm">${esc(it.nome)}</div>
        <div class="prev">solicitado: ${esp(it)} un · recebido: ${rec(it)} un</div>
        <div class="seg"><button type="button" data-ok="${k}" class="${it._c?'onok':''}">Confere</button><button type="button" data-no="${k}" class="${it._c?'':'onno'}">Divergência</button></div>
        ${div}<div class="sub2"><span>Data da entrega na clínica</span><input type="date" data-d="${k}" value="${it._d}"></div>
        <div class="sub2"><span>Comentário (opcional)</span><input data-c="${k}" value="${esc(it.novo)}"></div></div>`;
    }).join("")+(pend.length?`<div class="noent">Ainda não disponível p/ conferência: ${pend.map(i=>esc(i.nome)).join("; ")}</div>`:"");
    listEl.querySelectorAll("[data-ok]").forEach(b=>b.onclick=()=>{readInputs();work[b.dataset.ok]._c=true;draw();});
    listEl.querySelectorAll("[data-no]").forEach(b=>b.onclick=()=>{readInputs();work[b.dataset.no]._c=false;draw();});
  }
  draw();
  scrim.querySelector("#enClose").onclick=()=>scrim.remove();
  scrim.querySelector("#enConfirm").onclick=async()=>{
    readInputs();
    for(const it of elig){if(!it._c&&!it._obs.trim()){toast("Divergência de: "+it.nome);return;}}
    elig.forEach(it=>{it.clinica=it._c;it.clinica_obs=it._c?"":it._obs.trim();it.clinica_data=it._d||today();});
    const itens=work.map(it=>{const com=it.comentarios.slice();if(it.novo&&it.novo.trim())com.push({txt:it.novo.trim(),em:today()});
      return baseItem(it,{clinica:it.clinica,clinica_obs:it.clinica_obs,clinica_data:it.clinica_data,comentarios:com});});
    await salvar(id,itens,statusDe(itens)==="Entregue"?"Entrega concluída ✔":"Conferência salva",scrim);
  };
}

// monta item completo a partir do work + overrides
function baseItem(it,ov){
  const o=Object.assign({
    nome:it.nome, qtd_esperada:it.qtd_esperada, qtd_recebida:it.qtd_recebida, co_done:it.co_done,
    just_falta:it.just_falta, receb_data:it.receb_data,
    entrada:it.entrada, entrada_motivo:it.entrada_motivo, entrada_data:it.entrada_data,
    clinica:it.clinica, clinica_obs:it.clinica_obs, clinica_data:it.clinica_data,
    comentarios:it.comentarios
  },ov||{});
  return o;
}
async function salvar(id,itens,msg,scrim){
  const {error}=await sb.from("processos").update({itens,status:statusDe(itens)}).eq("id",id);
  if(error){toast("Erro: "+error.message);return;}
  scrim.remove();toast(msg);load();
}
function mkScrim(html){const s=document.createElement("div");s.className="scrim";s.innerHTML=html;document.body.appendChild(s);s.addEventListener("click",e=>{if(e.target===s)s.remove();});return s;}

// ---------- IMPORTAR LME ----------
function wireImport(){
  const btn=document.getElementById("impBtn"); if(!btn)return;
  const inp=document.getElementById("f_pdf"),st=document.getElementById("impStatus");
  btn.onclick=()=>inp.click();
  inp.onchange=async()=>{
    const file=inp.files[0]; if(!file)return;
    if(!window.pdfjsLib){st.className="impstatus err";st.textContent="Leitor de PDF não carregou.";return;}
    st.className="impstatus";st.textContent="Lendo "+file.name+"…";
    const res=await readLME(file);
    if(res.error){st.className="impstatus err";st.textContent="Não consegui ler este PDF. Preencha manualmente.";return;}
    const setF=(id,val)=>{if(val){const e=document.getElementById(id);e.value=val;e.closest("label.fld").classList.add("filled");}};
    setF("f_pac",res.paciente);
    if(res.data){const m=res.data.match(/(\d{2})\/(\d{2})\/(\d{4})/);if(m){const e=document.getElementById("f_prot");e.value=`${m[3]}-${m[2]}-${m[1]}`;e.closest("label.fld").classList.add("filled");}}
    if(res.meds&&res.meds.length)setF("f_med",res.meds.map(x=>x.nome+(x.qtd_mes?` — ${x.qtd_mes}/mês`:"")).join("\n"));
    const achou=[res.paciente&&"paciente",res.data&&"data",res.meds&&res.meds.length&&"medicação"].filter(Boolean);
    st.className="impstatus ok";st.textContent="✔ Lido: "+(achou.join(", ")||"nada");
    document.getElementById("reviseBox").innerHTML='<div class="revise">⚠ Confira os campos antes de criar.</div>';
  };
}
async function readLME(file){
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let items=[],fields=[];
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      tc.items.forEach(i=>{if(i.str&&i.str.trim())items.push({s:i.str,x:Math.round(i.transform[4]),y:Math.round(i.transform[5])});});
      const ann=await page.getAnnotations();
      ann.forEach(a=>{if(a.fieldName!==undefined)fields.push({name:a.fieldName,val:Array.isArray(a.fieldValue)?a.fieldValue.join(","):a.fieldValue,x:Math.round(a.rect[0]),y:Math.round(a.rect[3])});});
    }
    const t=parseLME(items),ff=parseFields(fields);
    return {paciente:(ff&&ff.paciente)||t.paciente,data:(ff&&ff.data)||t.data,meds:(ff&&ff.meds.length)?ff.meds:t.meds};
  }catch(e){return {error:String(e)};}
}
function parseFields(fields){
  const isInt=v=>/^\d+$/.test(String(v).trim());
  const f=fields.filter(a=>a.val!=null&&String(a.val).trim()!=="");
  if(!f.length)return null;
  const out={paciente:null,data:null,meds:[]};
  const pac=f.find(a=>/paciente/i.test(a.name)&&!/m[ãa]e|respons|m[eé]dico|telefone|documento|e-?mail|correio/i.test(a.name));
  if(pac)out.paciente=String(pac.val).trim();
  const dt=f.find(a=>/\b\d{2}\/\d{2}\/\d{4}\b/.test(String(a.val)));
  if(dt)out.data=String(dt.val).match(/\b\d{2}\/\d{2}\/\d{4}\b/)[0];
  const medFields=f.filter(a=>/med/i.test(a.name)&&!isInt(a.val)&&String(a.val).trim().length>3).sort((a,b)=>b.y-a.y);
  const qFields=f.filter(a=>isInt(a.val));
  for(const m of medFields){const near=qFields.filter(q=>Math.abs(q.y-m.y)<=8).sort((a,b)=>a.x-b.x);out.meds.push({nome:String(m.val).trim(),qtd_mes:near[0]?String(near[0].val).trim():null});}
  return (out.paciente||out.meds.length)?out:null;
}
function parseLME(items){
  const TOL=6;
  items=items.filter(i=>i.s.trim()!=="").sort((a,b)=>b.y-a.y||a.x-b.x);
  const lines=[];
  for(const it of items){let L=lines.find(l=>Math.abs(l.y-it.y)<=TOL);if(!L){L={y:it.y,items:[]};lines.push(L);}L.items.push(it);}
  lines.forEach(l=>l.items.sort((a,b)=>a.x-b.x));
  const text=l=>l.items.map(i=>i.s).join(" ").replace(/\s+/g," ").trim();
  const idxOf=re=>lines.findIndex(l=>re.test(text(l)));
  const out={paciente:null,data:null,meds:[]};
  const iPac=idxOf(/Nome\s*completo\s*do\s*Paciente/i);
  if(iPac>=0&&lines[iPac+1])out.paciente=lines[iPac+1].items.filter(i=>i.x<450).map(i=>i.s).join(" ").replace(/\s+/g," ").trim()||null;
  const iData=idxOf(/Data\s*da\s*solicita/i);
  const dateRe=/\b(\d{2}\/\d{2}\/\d{4})\b/;
  let datas=[];
  for(const l of lines){const m=text(l).match(dateRe);if(m)datas.push({y:l.y,d:m[1]});}
  if(iData>=0){const labY=lines[iData].y;const d=datas.filter(x=>x.y<labY).sort((a,b)=>b.y-a.y);out.data=(d[0]&&d[0].d)||null;}
  if(!out.data&&datas.length)out.data=datas[0].d;
  const iMedHdr=idxOf(/m[eê]s/i);
  const iEnd=idxOf(/9\s*-?\s*CID|Diagn[oó]stico/i);
  for(let k=iMedHdr+1;k<(iEnd<0?lines.length:iEnd);k++){
    const l=lines[k];if(!l)continue;
    const rownum=l.items.find(i=>i.x<70&&/^[1-6]$/.test(i.s.trim()));
    if(!rownum)continue;
    const nome=l.items.filter(i=>i.x>=55&&i.x<366&&!/^[1-6]$/.test(i.s.trim())).map(i=>i.s).join(" ").replace(/\s+/g," ").trim();
    if(!nome)continue;
    const qtds=l.items.filter(i=>i.x>=366&&/^\d+$/.test(i.s.trim())).sort((a,b)=>a.x-b.x).map(i=>i.s.trim());
    out.meds.push({nome,qtd_mes:qtds[0]||null});
  }
  return out;
}
